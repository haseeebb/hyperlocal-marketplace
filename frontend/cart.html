<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart — Find X</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="nav-ph"></div>

<div style="max-width:640px;margin:0 auto;padding:32px 24px">
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px">
    <a href="index.html" style="color:var(--cyan);font-size:20px">←</a>
    <h2 style="font-size:22px;font-weight:700">Your Cart</h2>
  </div>

  <div id="cartEmpty" style="display:none;text-align:center;padding:60px 20px">
    <div style="font-size:56px;margin-bottom:16px">🛒</div>
    <h3 style="font-size:18px;margin-bottom:8px;color:var(--text2)">Your cart is empty</h3>
    <p style="color:var(--text3);margin-bottom:24px">Browse products and add items to your cart</p>
    <a href="search.html" class="btn btn-cyan">Browse Products</a>
  </div>

  <div id="cartItems"></div>

  <div id="cartSummary" style="display:none">
    <div class="card" style="margin-top:16px;border-color:var(--border2)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <span style="color:var(--text2)">Total Items</span>
        <span id="totalItems" style="font-weight:600"></span>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
        <span style="color:var(--text2)">Estimated Total</span>
        <span id="totalPrice" style="font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--cyan)"></span>
      </div>
      <div style="background:rgba(0,229,255,0.05);border:1px solid var(--border2);border-radius:10px;padding:12px;font-size:13px;color:var(--text2);margin-bottom:16px">
        💡 Payment and delivery are handled directly between you and the seller via WhatsApp.
      </div>
      <button class="btn btn-red btn-full" onclick="clearCartAll()">
        🗑️ Clear Cart
      </button>
    </div>
  </div>
</div>

<div id="footer-ph"></div>

<script src="js/api.js"></script>
<script>
  document.getElementById('nav-ph').innerHTML = navHTML();
  document.getElementById('footer-ph').innerHTML = footerHTML();

  function renderCart(){
    if(!cart.length){
      document.getElementById('cartEmpty').style.display = 'block';
      document.getElementById('cartSummary').style.display = 'none';
      document.getElementById('cartItems').innerHTML = '';
      return;
    }

    document.getElementById('cartEmpty').style.display = 'none';
    document.getElementById('cartSummary').style.display = 'block';

    let total = 0;
    document.getElementById('cartItems').innerHTML = cart.map((item, i) => {
      total += Number(item.price);
      return `
      <div class="card" style="margin-bottom:10px;display:flex;gap:12px;align-items:center;padding:14px">
        <div style="width:60px;height:60px;border-radius:10px;background:var(--bg3);
          display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;overflow:hidden">
          ${item.image_url
            ? `<img src="${item.image_url}" style="width:100%;height:100%;object-fit:cover">`
            : '📦'}
        </div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${item.title}</div>
          <div style="font-size:12px;color:var(--text3);margin-top:2px">${item.store_name || ''} · ${item.city || 'Lahore'}</div>
          <div style="font-family:'Syne',sans-serif;font-weight:700;color:var(--cyan);margin-top:4px">
            PKR ${Number(item.price).toLocaleString()}
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0">
          <a href="https://wa.me/${item.whatsapp_number}?text=Hi! I want to buy ${encodeURIComponent(item.title)}"
            target="_blank" class="btn btn-green" style="font-size:12px;padding:6px 12px">💬 Buy</a>
          <button class="btn btn-red" style="font-size:12px;padding:6px 12px" onclick="removeItem(${i})">Remove</button>
        </div>
      </div>`;
    }).join('');

    document.getElementById('totalItems').textContent = cart.length + ' item' + (cart.length !== 1 ? 's' : '');
    document.getElementById('totalPrice').textContent = 'PKR ' + total.toLocaleString();
  }

  function removeItem(i){
    removeFromCart(i);
    renderCart();
    showToast('Item removed from cart');
  }

  function clearCartAll(){
    if(confirm('Clear all items from cart?')){
      cart = [];
      saveCart();
      renderCart();
    }
  }

  renderCart();
</script>
</body>
</html>
