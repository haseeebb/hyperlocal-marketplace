<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Find X</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .pass-wrap{position:relative}
    .pass-wrap input{padding-right:48px}
    .eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);
      background:none;border:none;cursor:pointer;font-size:18px;
      color:var(--text3);padding:4px;line-height:1;transition:color 0.2s}
    .eye-btn:hover{color:var(--cyan)}
  </style>
</head>
<body>
<div id="nav-ph"></div>

<div style="max-width:420px;margin:60px auto;padding:0 24px">
  <div class="card" style="border-color:var(--border2)">

    <div style="text-align:center;margin-bottom:28px">
      <div style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;
        color:var(--cyan);margin-bottom:8px">
        Find<span style="color:var(--text)">X</span>
      </div>
      <h2 style="font-size:20px;margin-bottom:6px">Welcome back</h2>
      <p style="color:var(--text2);font-size:13px">Login as Buyer, Seller or Admin</p>
    </div>

    <!-- Role indicators -->
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:24px">
      <div style="background:var(--bg3);border:1px solid var(--border);border-radius:10px;
        padding:10px 6px;text-align:center;font-size:12px;color:var(--text2)">
        🛍️<div style="margin-top:4px">Buyer</div>
      </div>
      <div style="background:var(--bg3);border:1px solid var(--border);border-radius:10px;
        padding:10px 6px;text-align:center;font-size:12px;color:var(--text2)">
        🏪<div style="margin-top:4px">Seller</div>
      </div>
      <div style="background:var(--bg3);border:1px solid var(--border);border-radius:10px;
        padding:10px 6px;text-align:center;font-size:12px;color:var(--text2)">
        ⚙️<div style="margin-top:4px">Admin</div>
      </div>
    </div>

    <div id="alertBox" class="alert alert-error"></div>

    <div class="form-group">
      <label class="form-label">Phone Number</label>
      <input type="text" id="phone" class="form-input" placeholder="e.g. 03174443343">
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="pass-wrap">
        <input type="password" id="password" class="form-input" placeholder="Your password">
        <button type="button" class="eye-btn" id="eyeLogin" onclick="togglePass('password','eyeLogin')">👁️</button>
      </div>
    </div>

    <button class="btn btn-cyan btn-full" id="loginBtn"
      style="margin-top:8px;font-family:'Syne',sans-serif;font-weight:700;padding:13px"
      onclick="doLogin()">
      Login →
    </button>

    <!-- Redirect info -->
    <div style="margin-top:20px;background:var(--bg3);border-radius:10px;padding:14px;font-size:12px">
      <div style="color:var(--text3);margin-bottom:8px;font-weight:500">After login you will go to:</div>
      <div style="color:var(--text2);margin-bottom:4px">🛍️ <strong style="color:var(--text)">Buyer</strong> — Home page</div>
      <div style="color:var(--text2);margin-bottom:4px">🏪 <strong style="color:var(--text)">Seller</strong> — Seller dashboard</div>
      <div style="color:var(--text2)">⚙️ <strong style="color:var(--text)">Admin</strong> — Admin dashboard</div>
    </div>

    <div style="text-align:center;margin-top:20px;font-size:13px;color:var(--text2)">
      Don't have an account?
      <a href="register.html" style="color:var(--cyan)">Create one →</a>
    </div>
    <div style="text-align:center;margin-top:8px">
      <a href="index.html" style="color:var(--text3);font-size:13px">← Back to home</a>
    </div>
  </div>
</div>

<div id="footer-ph"></div>
<script src="js/api.js"></script>
<script>
  document.getElementById('nav-ph').innerHTML = navHTML();
  document.getElementById('footer-ph').innerHTML = footerHTML();

  if(isLoggedIn()) window.location.href = 'index.html';

  function togglePass(inputId, btnId){
    const input = document.getElementById(inputId);
    const btn   = document.getElementById(btnId);
    if(input.type === 'password'){
      input.type    = 'text';
      btn.textContent = '🙈';
    } else {
      input.type    = 'password';
      btn.textContent = '👁️';
    }
  }

  async function doLogin(){
    const phone    = document.getElementById('phone').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('loginBtn');
    hideAlert('alertBox');

    if(!phone || !password){
      showAlert('alertBox','Please enter your phone number and password.');
      return;
    }

    btn.textContent = 'Logging in...';
    btn.disabled    = true;

    try {
      const data = await apiPost('/api/auth/login', { phone, password });
      if(data.access_token){
        setToken(data.access_token);
        setUser({ name: data.name, role: data.role || 'buyer' });
        showToast('Welcome back, ' + data.name + '! 👋');
        setTimeout(() => {
          const role = data.role || '';
          if(role.includes('admin'))        window.location.href = 'admin.html';
          else if(role.includes('seller'))  window.location.href = 'seller.html';
          else                              window.location.href = 'index.html';
        }, 800);
      } else {
        showAlert('alertBox', data.detail || 'Invalid credentials. Check your phone and password.');
        btn.textContent = 'Login →';
        btn.disabled    = false;
      }
    } catch(e){
      showAlert('alertBox','Connection error. Make sure the backend is running.');
      btn.textContent = 'Login →';
      btn.disabled    = false;
    }
  }

  document.addEventListener('keydown', e => {
    if(e.key === 'Enter') doLogin();
  });
</script>
</body>
</html>
